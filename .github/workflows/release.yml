# Triggers on version tags (e.g. v1.0.0).
# Produces two release artifacts:
#   1. MacCleaner-{version}-macos-arm64.zip  — full .app bundle (GUI users)
#   2. MacCleaner-{version}-cli.tar.gz       — CLI-only files (headless users)
#
# Note: GITHUB_REF_NAME is the tag name pushed by the repo owner.
# No user-controlled event input is used in any run: block.

name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-release:
    name: Package and Publish Release
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          echo "version=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "Release version: ${TAG_NAME}"

      - name: Verify Python syntax before packaging
        run: python3 -m py_compile cleaner.py

      - name: Package app bundle as zip
        id: package_app
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          APP_ZIP="MacCleaner-${VERSION}-macos-arm64.zip"

          if [ -d "MacCleaner.app" ]; then
            # ditto preserves macOS extended attributes and code signatures.
            # Never use `zip -r` for .app bundles — it strips these.
            ditto -c -k --sequesterRsrc --keepParent MacCleaner.app "${APP_ZIP}"
            echo "app_zip=${APP_ZIP}" >> "$GITHUB_OUTPUT"
            echo "app_zip_exists=true" >> "$GITHUB_OUTPUT"
            echo "Packaged: ${APP_ZIP} ($(du -sh ${APP_ZIP} | cut -f1))"
          else
            echo "app_zip_exists=false" >> "$GITHUB_OUTPUT"
            echo "MacCleaner.app not found — skipping app bundle artifact."
          fi

      - name: Package CLI-only tarball
        id: package_cli
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CLI_DIR="MacCleaner-${VERSION}-cli"
          CLI_TAR="${CLI_DIR}.tar.gz"

          mkdir -p "${CLI_DIR}"
          cp cleaner.py install.sh scheduler.sh config.json README.md "${CLI_DIR}/"
          echo "${VERSION}" > "${CLI_DIR}/VERSION"

          tar -czf "${CLI_TAR}" "${CLI_DIR}/"
          rm -rf "${CLI_DIR}"

          echo "cli_tar=${CLI_TAR}" >> "$GITHUB_OUTPUT"
          echo "Packaged: ${CLI_TAR} ($(du -sh ${CLI_TAR} | cut -f1))"

      - name: Generate release notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          {
            echo "## Installation"
            echo ""
            echo "### Option 1 — Full App (GUI + CLI)"
            echo "Download \`MacCleaner-${VERSION}-macos-arm64.zip\`, unzip, and run:"
            echo '```bash'
            echo "bash install.sh"
            echo "open ~/Applications/MacCleaner.app"
            echo '```'
            echo "> **First launch:** macOS may block the app (it is not yet notarized)."
            echo "> Right-click MacCleaner.app → Open → confirm."
            echo ""
            echo "### Option 2 — CLI only"
            echo "Download \`MacCleaner-${VERSION}-cli.tar.gz\` and run:"
            echo '```bash'
            echo "tar -xzf MacCleaner-${VERSION}-cli.tar.gz"
            echo "cd MacCleaner-${VERSION}-cli"
            echo "bash install.sh"
            echo '```'
            echo ""
            echo "## Requirements"
            echo "- macOS 12 Monterey or later"
            echo "- Python 3 (pre-installed on macOS)"
            echo "- Apple Silicon (arm64) for the app bundle"
          } > release_notes.md

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          name: "MacCleaner ${{ steps.version.outputs.version }}"
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          files: |
            ${{ steps.package_cli.outputs.cli_tar }}
            ${{ steps.package_app.outputs.app_zip_exists == 'true' && steps.package_app.outputs.app_zip || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
